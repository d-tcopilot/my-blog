<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电脑回收计价器</title>
<style>
:root {
  --bg: #f0f4f9;
  --card-bg: #ffffff;
  --text: #1e293b;
  --text-secondary: #475569;
  --text-muted: #64748b;
  --border: #cbd5e1;
  --input-bg: #f1f5f9;
  --primary: #2563eb;
  --primary-hover: #1d4ed8;
  --primary-light: rgba(37,99,235,0.10);
  --success: #10b981;
  --success-hover: #059669;
  --warning: #f97316;
  --warning-hover: #ea580c;
  --danger: #ef4444;
  --danger-hover: #dc2626;
  --danger-light: #fef2f2;
  --purple: #8b5cf6;
  --purple-hover: #7c3aed;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.10);
  --radius: 12px;
  --radius-sm: 8px;
  --transition: 0.2s ease;
}
[data-theme="dark"] {
  --bg: #0f172a;
  --card-bg: #1e293b;
  --text: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --border: #334155;
  --input-bg: #0f172a;
  --primary-light: rgba(59,130,246,0.15);
  --danger-light: rgba(239,68,68,0.15);
  --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.4);
}

* { margin:0; padding:0; box-sizing:border-box; }
html { font-size: 16px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 12px;
  min-height: 100vh;
  transition: background var(--transition), color var(--transition);
}
.container { max-width: 800px; margin: 0 auto; }

/* Header */
.header-bar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px; gap: 8px;
}
.header-bar h1 {
  font-size: clamp(18px, 4vw, 22px);
  color: var(--primary); font-weight: 700;
  white-space: nowrap;
}
.theme-toggle {
  width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--border);
  background: var(--card-bg); color: var(--text-secondary);
  font-size: 18px; cursor: pointer; display: flex; align-items: center;
  justify-content: center; transition: all var(--transition); flex-shrink: 0;
}
.theme-toggle:hover { border-color: var(--primary); color: var(--primary); }
.theme-toggle:active { transform: scale(0.92); }

/* Card */
.card {
  background: var(--card-bg); border-radius: var(--radius);
  padding: 14px; margin-bottom: 14px;
  box-shadow: var(--shadow); transition: background var(--transition), box-shadow var(--transition);
}

/* Record Name */
.name-box { margin-bottom: 12px; }
.name-box label {
  display: block; margin-bottom: 5px;
  font-size: 13px; color: var(--text-secondary); font-weight: 500;
}
#recordName {
  width: 100%; background: var(--input-bg); border: 1px solid var(--border);
  color: var(--text); border-radius: var(--radius-sm); padding: 10px 12px;
  font-size: 15px; transition: all var(--transition);
}
#recordName:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.15); }

/* Part Type Colors */
.part-tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600;
}
.tag-cpu { background: #dbeafe; color: #1d4ed8; }
.tag-mb  { background: #ede9fe; color: #6d28d9; }
.tag-ram { background: #d1fae5; color: #047857; }
.tag-ssd { background: #cffafe; color: #0e7490; }
.tag-gpu { background: #fce7f3; color: #be123c; }
.tag-psu { background: #ffedd5; color: #c2410c; }
.tag-case { background: #f3f4f6; color: #374151; }
[data-theme="dark"] .tag-cpu { background: rgba(59,130,246,0.2); color: #93c5fd; }
[data-theme="dark"] .tag-mb  { background: rgba(139,92,246,0.2); color: #c4b5fd; }
[data-theme="dark"] .tag-ram { background: rgba(16,185,129,0.2); color: #6ee7b7; }
[data-theme="dark"] .tag-ssd { background: rgba(6,182,212,0.2); color: #67e8f9; }
[data-theme="dark"] .tag-gpu { background: rgba(239,68,68,0.2); color: #fca5a5; }
[data-theme="dark"] .tag-psu { background: rgba(249,115,22,0.2); color: #fdba74; }
[data-theme="dark"] .tag-case { background: rgba(107,114,128,0.2); color: #d1d5db; }

/* Table-wrapper for horizontal scroll */
.table-wrap {
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  margin: 0 -4px; padding: 0 4px;
}

/* Row grid */
.row-grid {
  display: grid;
  grid-template-columns: 82px minmax(72px,1fr) 44px minmax(60px,80px) minmax(60px,80px) minmax(60px,80px) 32px;
  gap: 4px; align-items: center; margin-bottom: 8px;
  min-width: 420px;
}
.header-grid {
  font-weight: 600; font-size: 12px; color: var(--text-muted);
  padding: 0 0 6px 0; border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}
.header-grid .col-label { text-align: center; }

.row-grid select, .row-grid input {
  background: var(--input-bg); border: 1px solid var(--border);
  color: var(--text); border-radius: 6px; padding: 8px 4px;
  font-size: 14px; width: 100%; transition: all var(--transition);
}
.row-grid select:focus, .row-grid input:focus {
  outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(37,99,235,0.12);
}
.row-grid input[readonly] {
  background: transparent; border-color: transparent;
  font-weight: 700; color: var(--success); text-align: center;
  cursor: default;
}
.part-select { font-size: 14px !important; }
.name-input { font-size: 14px !important; }
.num-input { text-align: center; }

/* Delete button */
.del-btn {
  background: transparent; border: none; color: var(--text-muted);
  font-size: 18px; cursor: pointer; width: 100%; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 6px; transition: all var(--transition);
}
.del-btn:hover { background: var(--danger-light); color: var(--danger); }
.del-btn:active { transform: scale(0.88); }
.del-btn.hidden { visibility: hidden; pointer-events: none; }

/* Row delete animation */
.row-grid.deleting {
  animation: rowFadeOut 0.25s ease forwards;
}
@keyframes rowFadeOut {
  to { opacity: 0; transform: translateX(-16px); height: 0; margin-bottom: 0; overflow: hidden; }
}
@keyframes rowFadeIn {
  from { opacity: 0; transform: translateX(-12px); }
  to { opacity: 1; transform: translateX(0); }
}
.row-grid.new-row { animation: rowFadeIn 0.2s ease; }

/* Buttons */
.btn-group {
  display: grid; gap: 6px; margin-top: 12px;
}
.btn-row3 { grid-template-columns: 1fr 1fr 1fr; }
.btn-row2 { grid-template-columns: 1fr 1fr; }
@media (max-width: 480px) {
  .btn-row3 { grid-template-columns: 1fr 1fr; }
  .btn-row3 button:last-child { grid-column: 1 / -1; }
}

.btn {
  padding: 11px 8px; border: none; border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 600; cursor: pointer;
  transition: all var(--transition); white-space: nowrap;
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
}
.btn:active { transform: scale(0.96); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-hover); box-shadow: 0 2px 8px rgba(37,99,235,0.3); }
.btn-success { background: var(--success); color: white; }
.btn-success:hover { background: var(--success-hover); box-shadow: 0 2px 8px rgba(16,185,129,0.3); }
.btn-purple { background: var(--purple); color: white; }
.btn-purple:hover { background: var(--purple-hover); box-shadow: 0 2px 8px rgba(139,92,246,0.3); }
.btn-warning { background: var(--warning); color: white; }
.btn-warning:hover { background: var(--warning-hover); box-shadow: 0 2px 8px rgba(249,115,22,0.3); }
.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { background: var(--danger-hover); box-shadow: 0 2px 8px rgba(239,68,68,0.3); }

/* Stats bar */
.stats-bar {
  display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
  margin-bottom: 0;
}
.stat-item {
  font-size: 13px; color: var(--text-secondary);
  background: var(--input-bg); padding: 4px 10px; border-radius: 6px;
  display: inline-flex; align-items: center; gap: 4px;
}
.stat-item strong { color: var(--text); }

/* Total box */
.total-box {
  background: var(--primary-light); padding: 16px; border-radius: var(--radius);
  text-align: center; margin-bottom: 14px;
  transition: background var(--transition);
}
.total-header {
  font-size: 14px; color: var(--text-secondary); margin-bottom: 2px;
}
.total-price {
  font-size: clamp(28px, 6vw, 32px);
  color: var(--success); font-weight: 800;
  letter-spacing: -0.5px;
}
.category-breakdown {
  margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
}
.cat-item {
  font-size: 12px; padding: 3px 8px; border-radius: 4px;
  background: var(--card-bg); border: 1px solid var(--border);
  color: var(--text-secondary);
}
.cat-item .cat-price { font-weight: 700; color: var(--text); }

/* History */
.history-header {
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 8px; margin-bottom: 10px;
}
.history-header h2 { font-size: 16px; color: var(--text); font-weight: 600; }
#recordSearch {
  background: var(--input-bg); border: 1px solid var(--border);
  color: var(--text); border-radius: var(--radius-sm); padding: 8px 10px;
  font-size: 13px; width: 160px; transition: all var(--transition);
}
#recordSearch:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(37,99,235,0.12); }

.record-item {
  background: var(--input-bg); border-radius: var(--radius-sm);
  padding: 12px; margin-bottom: 8px;
  transition: all var(--transition);
}
.record-item:hover { background: var(--primary-light); }
.record-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 10px; cursor: pointer;
}
.record-info h3 {
  font-size: 15px; margin-bottom: 2px; color: var(--text);
  display: flex; align-items: center; gap: 6px;
}
.record-info .record-time { font-size: 12px; color: var(--text-muted); }
.record-price-info {
  color: var(--success); font-weight: 700; font-size: 15px;
}
.expand-hint { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

.record-actions {
  display: flex; gap: 4px; align-items: center; flex-shrink: 0;
}
.record-actions .btn-sm {
  padding: 6px 10px; font-size: 12px; border-radius: 6px;
  border: none; font-weight: 600; cursor: pointer;
  transition: all var(--transition);
}
.record-actions .btn-sm:active { transform: scale(0.94); }
.btn-sm-backfill { background: var(--primary); color: white; }
.btn-sm-backfill:hover { background: var(--primary-hover); }
.btn-sm-edit { background: transparent; color: var(--text-secondary); border: 1px solid var(--border) !important; }
.btn-sm-edit:hover { background: var(--primary-light); color: var(--primary); border-color: var(--primary) !important; }
.btn-sm-del { background: transparent; color: var(--text-muted); border: 1px solid var(--border) !important; }
.btn-sm-del:hover { background: var(--danger-light); color: var(--danger); border-color: var(--danger) !important; }

.record-detail {
  display: none; margin-top: 10px; padding-top: 10px;
  border-top: 1px solid var(--border); overflow-x: auto;
}
.record-detail.open { display: block; }
.record-detail table {
  width: 100%; border-collapse: collapse; font-size: 13px;
}
.record-detail th, .record-detail td {
  padding: 6px 4px; text-align: center; border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.record-detail th { color: var(--text-muted); font-weight: 600; font-size: 11px; }
.record-detail td { color: var(--text-secondary); }
.record-detail .td-name { text-align: left; min-width: 60px; }

.empty-tip {
  text-align: center; padding: 24px; color: var(--text-muted); font-size: 14px;
}

/* Modal overlay */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  z-index: 10000; display: flex; align-items: center; justify-content: center;
  animation: modalFadeIn 0.2s ease;
}
.modal-box {
  background: var(--card-bg); border-radius: var(--radius);
  padding: 24px; max-width: 380px; width: 90%;
  box-shadow: var(--shadow-lg); text-align: center;
}
.modal-box h3 { font-size: 17px; margin-bottom: 8px; color: var(--text); }
.modal-box p { font-size: 14px; color: var(--text-secondary); margin-bottom: 18px; line-height: 1.5; }
.modal-actions { display: flex; gap: 8px; justify-content: center; }
.modal-actions .btn { min-width: 80px; padding: 10px 18px; }
@keyframes modalFadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

/* Toast */
.toast-container {
  position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
  z-index: 9999; display: flex; flex-direction: column; gap: 6px;
  pointer-events: none;
}
.toast {
  background: var(--text); color: var(--card-bg);
  padding: 10px 18px; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500;
  box-shadow: var(--shadow-lg);
  white-space: nowrap; pointer-events: auto; text-align: center;
  animation: toastIn 0.25s ease, toastOut 0.3s ease 1.7s forwards;
}
.toast.warn { background: var(--warning); color: white; }
.toast.success { background: var(--success); color: white; }
@keyframes toastIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

/* Print */
@media print {
  body { background: #fff !important; padding: 0 !important; }
  .card { box-shadow: none !important; border: 1px solid #ddd !important; }
  .btn-group, .btn, .toast-container, .history-header, #recordWrap,
  .history-section, .del-btn, .name-box, .stats-bar, .theme-toggle,
  #importJsonBtn, .category-breakdown, .export-json-btn { display: none !important; }
  .table-wrap { overflow: visible !important; }
  .row-grid { min-width: auto !important; }
  .total-box { border: 1px solid #ddd; }
  h1 { color: #000 !important; }
  .header-bar h1 { color: #000 !important; }
}

/* Responsive: very small screens */
@media (max-width: 400px) {
  .row-grid { font-size: 13px; }
  .row-grid select, .row-grid input { padding: 6px 2px; font-size: 13px; }
  .record-actions { flex-wrap: wrap; }
}

/* Export JSON button inline */
.export-area {
  display: flex; gap: 6px; justify-content: flex-end; margin-top: 6px;
}
.export-json-btn {
  background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
  padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer;
  transition: all var(--transition);
}
.export-json-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
</style>
</head>
<body>
<div class="toast-container" id="toastContainer"></div>
<div class="container">

  <!-- Header -->
  <div class="header-bar">
    <h1>♻️ 电脑回收计价器</h1>
    <button class="theme-toggle" id="themeToggle" title="切换暗色模式">🌙</button>
  </div>

  <!-- Record Name -->
  <div class="card name-box">
    <label>本次报价名称（主机备注）</label>
    <input type="text" id="recordName" placeholder="例如：i5 12400 + RTX 4060 主机">
  </div>

  <!-- Main Card -->
  <div class="card">
    <div class="table-wrap">
      <div class="row-grid header-grid" id="headerRow">
        <div class="col-label">配件类型</div>
        <div class="col-label">配件名称</div>
        <div class="col-label">数量</div>
        <div class="col-label">单价</div>
        <div class="col-label">扣减</div>
        <div class="col-label">小计</div>
        <div></div>
      </div>
      <div id="listWrap"></div>
    </div>

    <div class="btn-group btn-row3">
      <button class="btn btn-primary" id="addRowBtn">＋ 新增配件</button>
      <button class="btn btn-success" id="saveRecordBtn">💾 保存报价</button>
      <button class="btn btn-purple" id="exportBtn">🖨️ 导出打印</button>
    </div>
    <div class="btn-group btn-row2">
      <button class="btn btn-warning" id="clearCurrentBtn">🗑️ 清空当前</button>
      <button class="btn btn-danger" id="clearAllDataBtn">⚠️ 清空全部数据</button>
    </div>
  </div>

  <!-- Stats bar -->
  <div class="card">
    <div class="stats-bar" id="statsBar"></div>
  </div>

  <!-- Total -->
  <div class="total-box" id="totalBox">
    <div class="total-header">当前整机回收总价</div>
    <div class="total-price" id="totalShow">¥0.00</div>
    <div class="category-breakdown" id="categoryBreakdown"></div>
  </div>

  <!-- History -->
  <div class="card" id="historySection">
    <div class="history-header">
      <h2>📋 历史报价记录</h2>
      <input type="text" id="recordSearch" placeholder="搜索报价名称...">
    </div>
    <div id="recordWrap"></div>
    <div class="export-area">
      <button class="export-json-btn" id="exportJsonBtn">📤 导出 JSON</button>
      <button class="export-json-btn" id="importJsonBtn">📥 导入 JSON</button>
      <input type="file" id="importJsonInput" accept=".json" style="display:none">
    </div>
  </div>
</div>

<script>
(function() {
  "use strict";

  const PART_COLORS = {
    "CPU":   "cpu",  "主板": "mb",  "内存": "ram",
    "固态": "ssd",   "显卡": "gpu",  "电源": "psu",  "机箱": "case"
  };
  const TAG_MAP = {
    "cpu":"tag-cpu","mb":"tag-mb","ram":"tag-ram",
    "ssd":"tag-ssd","gpu":"tag-gpu","psu":"tag-psu","case":"tag-case"
  };
  const fixedParts = ["CPU","主板","内存","固态","显卡"];
  const extendParts = ["电源","机箱"];
  const allParts = fixedParts.concat(extendParts);
  const STORAGE_KEY = "pc_recycle_records";
  const TEMP_DATA_KEY = "pc_recycle_temp";
  const THEME_KEY = "pc_recycle_theme";

  const $ = id => document.getElementById(id);
  const listWrap = $("listWrap");
  const totalShow = $("totalShow");
  const recordWrap = $("recordWrap");
  const toastContainer = $("toastContainer");
  const recordNameInput = $("recordName");
  const recordSearch = $("recordSearch");
  const statsBar = $("statsBar");
  const categoryBreakdown = $("categoryBreakdown");

  let theme = localStorage.getItem(THEME_KEY) || "light";

  /* ============== Theme ============== */
  function applyTheme(t) {
    document.documentElement.setAttribute("data-theme", t);
    $("themeToggle").textContent = t === "dark" ? "☀️" : "🌙";
    localStorage.setItem(THEME_KEY, t);
    theme = t;
  }
  applyTheme(theme);
  $("themeToggle").addEventListener("click", () => applyTheme(theme === "dark" ? "light" : "dark"));

  /* ============== Toast ============== */
  function showToast(msg, type) {
    const el = document.createElement("div");
    el.className = "toast" + (type ? " " + type : "");
    el.textContent = msg;
    toastContainer.appendChild(el);
    setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 2000);
  }

  /* ============== XSS Escape ============== */
  function esc(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
  }

  /* ============== Calculations ============== */
  function calcSub(num, price, cut) {
    const n = Math.max(0, Number(num) || 0);
    const p = Math.max(0, Number(price) || 0);
    const c = Math.max(0, Number(cut) || 0);
    return Math.max(0, n * p - c);
  }

  function updateRowSub(row) {
    const num = row.querySelector(".num-input").value;
    const price = row.querySelector(".price-input").value;
    const cut = row.querySelector(".cut-input").value;
    row.querySelector(".sub-input").value = calcSub(num, price, cut).toFixed(2);
  }

  function calcTotal() {
    let total = 0;
    document.querySelectorAll("#listWrap .sub-input").forEach(el => {
      total += Number(el.value) || 0;
    });
    totalShow.textContent = "¥" + total.toFixed(2);
    updateStats();
    return total;
  }

  /* ============== Stats & Breakdown ============== */
  function updateStats() {
    const rows = listWrap.querySelectorAll(".row-grid:not(.header-grid)");
    let count = 0;
    const catTotals = {};
    rows.forEach(r => {
      const part = r.querySelector(".part-select").value;
      const sub = Number(r.querySelector(".sub-input").value) || 0;
      catTotals[part] = (catTotals[part] || 0) + sub;
      count++;
    });

    statsBar.innerHTML = "";
    const countEl = document.createElement("span");
    countEl.className = "stat-item";
    countEl.innerHTML = "📦 配件总数 <strong>" + count + "</strong>";
    statsBar.appendChild(countEl);

    const total = Number(totalShow.textContent.replace("¥","")) || 0;
    const priceEl = document.createElement("span");
    priceEl.className = "stat-item";
    priceEl.innerHTML = "💰 总价 <strong>¥" + total.toFixed(2) + "</strong>";
    statsBar.appendChild(priceEl);

    // Category breakdown
    categoryBreakdown.innerHTML = "";
    allParts.forEach(p => {
      if (catTotals[p] && catTotals[p] > 0) {
        const tagClass = TAG_MAP[PART_COLORS[p]] || "";
        const el = document.createElement("span");
        el.className = "cat-item " + tagClass;
        el.innerHTML = esc(p) + " <span class='cat-price'>¥" + catTotals[p].toFixed(2) + "</span>";
        categoryBreakdown.appendChild(el);
      }
    });
  }

  /* ============== Save Temp ============== */
  function saveTempData() {
    const rows = [];
    listWrap.querySelectorAll(".row-grid:not(.header-grid)").forEach(r => {
      rows.push({
        part: r.querySelector(".part-select").value,
        name: r.querySelector(".name-input").value,
        num: Number(r.querySelector(".num-input").value) || 0,
        price: r.querySelector(".price-input").value,
        cut: r.querySelector(".cut-input").value,
        fixed: r.getAttribute("data-fixed") === "true"
      });
    });
    localStorage.setItem(TEMP_DATA_KEY, JSON.stringify(rows));
  }

  /* ============== Create Row ============== */
  function createRow(data, animate) {
    data = data || {};
    const partVal = data.part || extendParts[0];
    const nameVal = data.name || "";
    const numVal = data.num != null ? data.num : 1;
    const priceVal = data.price != null ? data.price : "";
    const cutVal = data.cut != null ? data.cut : "";
    const fixed = data.fixed === true;
    const subVal = calcSub(numVal, priceVal, cutVal).toFixed(2);

    const colorKey = PART_COLORS[partVal] || "";
    const tagClass = TAG_MAP[colorKey] || "";

    const row = document.createElement("div");
    row.className = "row-grid" + (animate ? " new-row" : "");
    if (fixed) row.setAttribute("data-fixed", "true");

    const selectOptions = allParts.map(p =>
      '<option value="' + esc(p) + '"' + (p === partVal ? " selected" : "") + '>' + esc(p) + '</option>'
    ).join("");

    row.innerHTML =
      '<select class="part-select">' + selectOptions + '</select>' +
      '<input type="text" class="name-input" value="' + esc(nameVal) + '" placeholder="型号">' +
      '<input type="number" class="num-input" value="' + numVal + '" min="0">' +
      '<input type="number" class="price-input" value="' + esc(String(priceVal)) + '" min="0" placeholder="单价">' +
      '<input type="number" class="cut-input" value="' + esc(String(cutVal)) + '" min="0" placeholder="扣减">' +
      '<input type="text" class="sub-input" value="' + subVal + '" readonly>' +
      '<button class="del-btn' + (fixed ? " hidden" : "") + '" title="删除此行">✕</button>';

    listWrap.appendChild(row);

    // Event: input changes
    row.querySelectorAll("input, select").forEach(el => {
      el.addEventListener("input", () => {
        updateRowSub(row);
        calcTotal();
        saveTempData();
      });
    });

    // Event: delete
    const delBtn = row.querySelector(".del-btn");
    if (!fixed && delBtn) {
      delBtn.addEventListener("click", () => {
        row.classList.add("deleting");
        setTimeout(() => {
          if (row.parentNode) row.parentNode.removeChild(row);
          calcTotal();
          saveTempData();
          showToast("已删除该配件行");
        }, 250);
      });
    }

    return row;
  }

  /* ============== Init ============== */
  function init() {
    listWrap.innerHTML = "";
    const tempData = localStorage.getItem(TEMP_DATA_KEY);
    if (tempData) {
      try {
        const rows = JSON.parse(tempData);
        if (rows && rows.length) {
          rows.forEach(r => createRow(r, false));
        } else {
          createDefaults();
        }
      } catch(_) { createDefaults(); }
    } else {
      createDefaults();
    }
    calcTotal();
    renderRecords();
  }

  function createDefaults() {
    fixedParts.forEach(p => createRow({part: p, num: 1, price: "", cut: "", fixed: true}, false));
  }

  /* ============== Modal ============== */
  function showConfirm(title, msg) {
    return new Promise(resolve => {
      const overlay = document.createElement("div");
      overlay.className = "modal-overlay";
      overlay.innerHTML =
        '<div class="modal-box">' +
          '<h3>' + esc(title) + '</h3>' +
          '<p>' + esc(msg) + '</p>' +
          '<div class="modal-actions">' +
            '<button class="btn btn-danger" id="modalConfirmBtn">确认</button>' +
            '<button class="btn" style="background:var(--input-bg);color:var(--text);border:1px solid var(--border)" id="modalCancelBtn">取消</button>' +
          '</div>' +
        '</div>';
      document.body.appendChild(overlay);

      overlay.querySelector("#modalConfirmBtn").addEventListener("click", () => {
        document.body.removeChild(overlay);
        resolve(true);
      });
      overlay.querySelector("#modalCancelBtn").addEventListener("click", () => {
        document.body.removeChild(overlay);
        resolve(false);
      });
      overlay.addEventListener("click", e => {
        if (e.target === overlay) {
          document.body.removeChild(overlay);
          resolve(false);
        }
      });
    });
  }

  /* ============== Save Record ============== */
  function saveRecord() {
    const total = calcTotal();
    const recordName = recordNameInput.value.trim() || "未命名主机";
    if (total <= 0) {
      showToast("请填写有效配件回收价格！", "warn");
      return;
    }
    const detail = [];
    listWrap.querySelectorAll(".row-grid:not(.header-grid)").forEach(r => {
      detail.push({
        part: r.querySelector(".part-select").value,
        name: r.querySelector(".name-input").value,
        num: Number(r.querySelector(".num-input").value) || 0,
        price: r.querySelector(".price-input").value,
        cut: r.querySelector(".cut-input").value,
        sub: r.querySelector(".sub-input").value
      });
    });
    let records;
    try { records = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); } catch(_) { records = []; }
    records.unshift({
      name: recordName,
      time: new Date().toLocaleString(),
      total: total.toFixed(2),
      detail: detail
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    renderRecords();
    recordNameInput.value = "";
    showToast("报价「" + recordName + "」保存成功！", "success");
  }

  /* ============== Render Records ============== */
  function renderRecords() {
    let records;
    try { records = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); } catch(_) { records = []; }
    const keyword = (recordSearch.value || "").trim().toLowerCase();
    const filtered = keyword
      ? records.filter(item => item.name.toLowerCase().includes(keyword))
      : records;

    recordWrap.innerHTML = "";
    if (!filtered.length) {
      recordWrap.innerHTML = '<div class="empty-tip">' +
        (keyword ? '没有匹配「' + esc(keyword) + '」的报价记录' : '暂无保存的报价记录') +
        '</div>';
      return;
    }

    filtered.forEach(item => {
      const el = document.createElement("div");
      el.className = "record-item";

      let detailRows = "";
      item.detail.forEach(d => {
        detailRows += "<tr>" +
          "<td>" + esc(d.part) + "</td>" +
          "<td class='td-name'>" + esc(d.name || "-") + "</td>" +
          "<td>" + (d.num || 0) + "</td>" +
          "<td>" + esc(String(d.price || "")) + "</td>" +
          "<td>" + esc(String(d.cut || "")) + "</td>" +
          "<td>" + esc(String(d.sub || "0.00")) + "</td>" +
          "</tr>";
      });

      el.innerHTML =
        '<div class="record-header" data-expand>'
          + '<div class="record-info">'
            + '<h3><span class="record-name-label">' + esc(item.name) + '</span></h3>'
            + '<div class="record-time">' + esc(item.time) + '</div>'
            + '<div class="record-price-info">总价 ¥' + esc(item.total) + '</div>'
            + '<div class="expand-hint">点击展开查看明细</div>'
          + '</div>'
          + '<div class="record-actions">'
            + '<button class="btn-sm btn-sm-edit btn-rename" title="重命名">✏️</button>'
            + '<button class="btn-sm btn-sm-backfill btn-backfill">回填</button>'
            + '<button class="btn-sm btn-sm-del btn-del-record">删除</button>'
          + '</div>'
        + '</div>'
        + '<div class="record-detail">'
          + '<table><thead><tr><th>类型</th><th>名称</th><th>数量</th><th>单价</th><th>扣减</th><th>小计</th></tr></thead>'
          + '<tbody>' + detailRows + '</tbody></table>'
        + '</div>';

      recordWrap.appendChild(el);

      // Expand/collapse
      const header = el.querySelector("[data-expand]");
      const detail = el.querySelector(".record-detail");
      const hint = el.querySelector(".expand-hint");
      header.addEventListener("click", e => {
        if (e.target.closest("button")) return;
        const open = detail.classList.toggle("open");
        hint.textContent = open ? "点击收起明细" : "点击展开查看明细";
      });

      // Backfill
      el.querySelector(".btn-backfill").addEventListener("click", e => {
        e.stopPropagation();
        backfillRecord(item);
      });

      // Delete with modal
      el.querySelector(".btn-del-record").addEventListener("click", async e => {
        e.stopPropagation();
        const ok = await showConfirm("删除报价", "确定要删除「" + item.name + "」吗？此操作无法恢复。");
        if (!ok) return;
        let allRecords;
        try { allRecords = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); } catch(_) { allRecords = []; }
        const idx = allRecords.findIndex(r => r.time === item.time && r.name === item.name);
        if (idx !== -1) {
          allRecords.splice(idx, 1);
          localStorage.setItem(STORAGE_KEY, JSON.stringify(allRecords));
          renderRecords();
          showToast("已删除报价记录「" + item.name + "」");
        }
      });

      // Rename
      el.querySelector(".btn-rename").addEventListener("click", async e => {
        e.stopPropagation();
        const newName = prompt("请输入新的报价名称：", item.name);
        if (!newName || newName.trim() === item.name) return;
        let allRecords;
        try { allRecords = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); } catch(_) { allRecords = []; }
        const idx = allRecords.findIndex(r => r.time === item.time && r.name === item.name);
        if (idx !== -1) {
          allRecords[idx].name = newName.trim();
          localStorage.setItem(STORAGE_KEY, JSON.stringify(allRecords));
          renderRecords();
          showToast("已重命名为「" + newName.trim() + "」", "success");
        }
      });
    });
  }

  /* ============== Backfill ============== */
  function backfillRecord(item) {
    listWrap.innerHTML = "";
    (item.detail || []).forEach(d => {
      createRow({
        part: d.part, name: d.name || "", num: d.num || 0,
        price: d.price || "", cut: d.cut || "",
        fixed: fixedParts.includes(d.part)
      }, false);
    });
    recordNameInput.value = item.name || "";
    calcTotal();
    saveTempData();
    showToast("已回填报价「" + item.name + "」，可修改后重新保存", "success");
  }

  /* ============== Export Print ============== */
  function exportPrint() {
    const recordName = recordNameInput.value.trim() || "未命名报价";
    const rows = [];
    listWrap.querySelectorAll(".row-grid:not(.header-grid)").forEach(r => {
      const num = Number(r.querySelector(".num-input").value) || 0;
      const price = r.querySelector(".price-input").value;
      const cut = r.querySelector(".cut-input").value;
      const sub = r.querySelector(".sub-input").value;
      if (num === 0 && !price && !cut) return;
      rows.push({
        part: r.querySelector(".part-select").value,
        name: r.querySelector(".name-input").value, num, price, cut, sub
      });
    });
    const total = calcTotal();
    const now = new Date().toLocaleString();

    let detailHtml = "";
    rows.forEach(it => {
      detailHtml += "<tr><td>" + esc(it.part) + "</td><td>" + esc(it.name || "-") + "</td><td>" + it.num + "</td><td>" + esc(String(it.price||"")) + "</td><td>" + esc(String(it.cut||"")) + "</td><td>" + esc(String(it.sub||"0.00")) + "</td></tr>";
    });

    const printWin = window.open("about:blank", "_blank");
    if (!printWin) {
      showToast("弹窗被浏览器拦截，请允许弹窗后重试", "warn");
      return;
    }
    printWin.document.write(
      '<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>报价单 - ' + esc(recordName) + '</title>'
      + '<style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding:30px;color:#1e293b;}'
      + 'h1{text-align:center;color:#2563eb;margin-bottom:6px;}'
      + '.subtitle{text-align:center;color:#64748b;font-size:13px;margin-bottom:20px;}'
      + 'table{width:100%;border-collapse:collapse;margin-bottom:20px;}'
      + 'th,td{border:1px solid #cbd5e1;padding:10px 8px;text-align:center;font-size:14px;}'
      + 'th{background:#f1f5f9;color:#475569;font-weight:600;}'
      + '.td-name{text-align:left;}'
      + '.total-line{text-align:right;font-size:20px;font-weight:bold;color:#059669;margin-top:10px;}'
      + '.footer{text-align:center;color:#94a3b8;font-size:12px;margin-top:30px;border-top:1px solid #e2e8f0;padding-top:16px;}'
      + '@media print{body{padding:20px;}h1{color:#000;}}'
      + '</style></head><body>'
      + '<h1>电脑回收报价单</h1>'
      + '<div class="subtitle">' + esc(recordName) + ' &nbsp;|&nbsp; ' + esc(now) + '</div>'
      + '<table><thead><tr><th>配件类型</th><th>配件名称</th><th>数量</th><th>单价</th><th>扣减</th><th>小计</th></tr></thead><tbody>'
      + detailHtml + '</tbody></table>'
      + '<div class="total-line">整机回收总价：¥' + total.toFixed(2) + '</div>'
      + '<div class="footer">由电脑回收计价工具生成 · ' + esc(now) + '</div>'
      + '<script>window.onload=function(){window.print();}<\/script>'
      + '</body></html>'
    );
    printWin.document.close();
  }

  /* ============== Clear Current ============== */
  function clearCurrentParts() {
    listWrap.querySelectorAll(".row-grid:not(.header-grid)").forEach(r => {
      r.querySelector(".name-input").value = "";
      r.querySelector(".num-input").value = 1;
      r.querySelector(".price-input").value = "";
      r.querySelector(".cut-input").value = "";
      updateRowSub(r);
    });
    calcTotal();
    saveTempData();
    recordNameInput.value = "";
    showToast("已清空当前配件数据");
  }

  /* ============== Clear All ============== */
  async function clearAllLocalData() {
    const ok = await showConfirm("清空全部数据", "确定要清空所有报价记录和当前填写数据吗？此操作无法恢复！");
    if (!ok) return;
    localStorage.removeItem(TEMP_DATA_KEY);
    localStorage.removeItem(STORAGE_KEY);
    init();
    recordNameInput.value = "";
    showToast("全部数据已清空", "warn");
  }

  /* ============== JSON Export/Import ============== */
  function exportJson() {
    let records;
    try { records = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); } catch(_) { records = []; }
    if (!records.length) {
      showToast("暂无数据可导出", "warn");
      return;
    }
    const blob = new Blob([JSON.stringify(records, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "电脑回收报价数据_" + new Date().toISOString().slice(0,10) + ".json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast("数据导出成功！", "success");
  }

  function importJson() {
    $("importJsonInput").click();
  }

  $("importJsonInput").addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const data = JSON.parse(ev.target.result);
        if (!Array.isArray(data)) throw new Error("格式错误");
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        renderRecords();
        showToast("导入成功！共 " + data.length + " 条记录", "success");
      } catch(_) {
        showToast("导入失败：文件格式不正确", "warn");
      }
    };
    reader.readAsText(file);
    this.value = "";
  });

  /* ============== Event Bindings ============== */
  $("addRowBtn").addEventListener("click", () => {
    createRow({part: "电源", num: 1, price: "", cut: "", fixed: false}, true);
    saveTempData();
    calcTotal();
  });
  $("saveRecordBtn").addEventListener("click", saveRecord);
  $("exportBtn").addEventListener("click", exportPrint);
  $("clearCurrentBtn").addEventListener("click", clearCurrentParts);
  $("clearAllDataBtn").addEventListener("click", clearAllLocalData);
  $("exportJsonBtn").addEventListener("click", exportJson);
  $("importJsonBtn").addEventListener("click", importJson);
  recordSearch.addEventListener("input", renderRecords);

  window.onload = init;
})();
</script>
</body>
</html>
